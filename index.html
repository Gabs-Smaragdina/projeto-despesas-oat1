    <div id="main">
        <h2>Registro de nova despesa</h2>
        <form id="form-despesa">
      <div class="linha">
        <select name="ano" id="ano">
            <option value="">ano</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
            <option value="2027">2027</option>
            <option value="2028">2028</option>
        </select>
        <select name="mes" id="mes">

            <option value="2">Fev</option>
            <option value="3">Mar</option>
            <option value="4">Abr</option>
            <option value="5">Mai</option>
            <option value="6">Jun</option>
            <option value="7">Jul</option>
            <option value="8">Ago</option>
            <option value="9">Set</option>
            <option value="10">Out</option>
            <option value="11">Nov</option>
            <option value="12">Dez</option>
        </select>
        <select name="dia" id="dia">
            <option value="">Dia</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>

            <option value="11">11</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
            <option value="17">17</option>
            <option value="18">18</option>
            <option value="19">19</option>
            <option value="20">20</option>
            <option value="21">21</option>
            <option value="22">22</option>
            <option value="23">23</option>
            <option value="24">24</option>
            <option value="25">25</option>
            <option value="26">26</option>
            <option value="27">27</option>
            <option value="28">28</option>
            <option value="29">29</option>
            <option value="30">30</option>
            <option value="31">31</option>
        </select>
        <select name="tipo" id="tipo">
            <option value="">Tipo</option>
            <option value="1">Alimentação</option>
            <option value="2">Transporte</option>
            <option value="3">Jogos</option>
            <option value="4">Relacionamento</option>
            <option value="5">Outros</option>
        </select>
      </div>
      <div class="linha">
        <input type="text" placeholder="Descrição" name="descricao" id="descricao"/>
        <input type="number" placeholder="Valor" name="valor" id="valor"/>
        <button type="button" title="Adicionar despesa" onclick="cadastrarDespesas()">
          <i class="fas fa-plus" ></i>
        </button>
      </div>
    </form>
    </div>


    <div id="popup" class="popup oculto">
  <div id="popupTitulo" class="popup-titulo"></div>
  <div id="popupDescricao" class="popup-descricao"></div>
  <button id="popupBotao" class="popup-botao"></button>
</div>
